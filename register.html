<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentHub - Login</title>

    <link rel="icon" type="image/png" href="images/renthub-logo.png">
    <link rel="stylesheet" href="register.css">
</head>

<body>

    <header>
        <nav class="navbar">

            <div class="logo">
                <img src="images/renthub-logo.png" alt="RentHub Logo" onclick="window.location.href='index.html'">
            </div>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Rentals</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

            <button class="hamburger" id="hamburgerBtn" aria-label="Toggle Navigation Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

        </nav>
    </header>

    <!-- Login Section -->
    <section class="login-section">

        <div class="login-container">

            <h2>Create RentHub Account</h2>

            <form>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="login-btn">
                    Register
                </button>

                <p class="signup-text">
                    Already have an account?
                    <a href="login.html">Login Here</a>
                </p>

            </form>

        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 RentHub. All Rights Reserved.</p>
    </footer>

    <script src="js/forms.js"></script>

</body>

</html>
