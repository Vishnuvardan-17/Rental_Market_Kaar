<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentHub - Login</title>
    <link rel="icon" type="image/png" href="images/ChatGPT Image Jun 15, 2026, 09_57_55 AM.png">
    <link rel="stylesheet" href="register.css">
</head>

<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="images/ChatGPT Image Jun 15, 2026, 09_57_55 AM.png" alt="RentHub Logo" onclick="window.location.href='index.html'">
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Rentals</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Login Section -->
    <section class="login-section">
        <div class="login-container">
            <h2>Welcome Back</h2>

            <form>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn">
                    Login
                </button>

                <p class="signup-text">
                    Don't have an account?
                    <a href="register.html">Register Here</a>
                </p>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 RentHub. All Rights Reserved.</p>
    </footer>

</body>

</html>
